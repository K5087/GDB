name: Build GDB

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gdb:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: nu {0}

    env:
      GDB_VERSION: "17.2"
      GMP_VERSION: "6.3.0"
      MPFR_VERSION: "4.2.1"
      ZLIB_VERSION: "1.3.2"
      XZ_VERSION: "5.8.1"
      EXPAT_VERSION: "2.7.1"
      LLVM_MINGW_VERSION: "20260505"
      PREFIX: "${{ github.workspace }}/gdb-install"
      DEPS_PREFIX: "${{ github.workspace }}/deps-install"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"

      - name: Install host build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            texinfo \
            bison \
            flex \
            gettext \
            wget \
            curl \
            xz-utils \
            unzip \
            ca-certificates \
            make \
            pkg-config

      - name: Download llvm-mingw
        run: |
          let url = $"https://github.com/mstorsjo/llvm-mingw/releases/download/($env.LLVM_MINGW_VERSION)/llvm-mingw-($env.LLVM_MINGW_VERSION)-ucrt-ubuntu-22.04-x86_64.tar.xz"
          wget -O llvm-mingw.tar.xz $url
          tar -xf llvm-mingw.tar.xz
          mv $"llvm-mingw-($env.LLVM_MINGW_VERSION)-ucrt-ubuntu-22.04-x86_64" llvm-mingw

          $"($env.GITHUB_WORKSPACE)/llvm-mingw/bin" | save --append $env.GITHUB_PATH

      - name: Download sources
        run: |
          wget -O zlib.tar.gz https://zlib.net/zlib-($env.ZLIB_VERSION).tar.gz
          wget -O xz.tar.xz https://github.com/tukaani-project/xz/releases/download/v($env.XZ_VERSION)/xz-($env.XZ_VERSION).tar.xz
          wget -O expat.tar.xz https://github.com/libexpat/libexpat/releases/download/R_2_7_1/expat-($env.EXPAT_VERSION).tar.xz
          wget -O gdb.tar.xz $"https://ftp.gnu.org/gnu/gdb/gdb-($env.GDB_VERSION).tar.xz"
          wget -O gmp.tar.xz $"https://ftp.gnu.org/gnu/gmp/gmp-($env.GMP_VERSION).tar.xz"
          wget -O mpfr.tar.xz $"https://ftp.gnu.org/gnu/mpfr/mpfr-($env.MPFR_VERSION).tar.xz"

          tar -xf gmp.tar.xz
          tar -xf mpfr.tar.xz
          tar -xf zlib.tar.gz
          tar -xf xz.tar.xz
          tar -xf expat.tar.xz
          tar -xf gdb.tar.xz

      - name: Build zlib
        run: |
          cd zlib-($env.ZLIB_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
          } {
            ^./configure --static $"--prefix=($env.DEPS_PREFIX)"
            make -j (sys cpu | length)
            make install
          }

      - name: Build xz liblzma
        run: |
          cd xz-($env.XZ_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ^./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
              --disable-xz
              --disable-xzdec
              --disable-lzmadec
              --disable-lzmainfo
              --disable-scripts
              --disable-doc
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build expat
        run: |
          cd expat-($env.EXPAT_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ^./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build GMP
        run: |
          cd $"gmp-($env.GMP_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build MPFR
        run: |
          cd $"mpfr-($env.MPFR_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              $"--with-gmp=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Configure GDB
        run: |
          mkdir build-gdb
          cd build-gdb

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib -static"
          } {
            ../gdb-($env.GDB_VERSION)/configure ...[
              $"--prefix=($env.PREFIX)"
              --host=x86_64-w64-mingw32
              --target=x86_64-w64-mingw32
              $"--with-gmp=($env.DEPS_PREFIX)"
              $"--with-mpfr=($env.DEPS_PREFIX)"
              --without-python
              --without-guile
              --with-expat
              --with-lzma
              --with-zlib
              --disable-tui
              --enable-targets=all
              --enable-64-bit-bfd
              --enable-binary-file-formats=all
              --disable-binutils
              --disable-ld
              --disable-gold
              --disable-gas
              --disable-sim
              --disable-gprof
              --disable-gprofng
            ]
          }

      - name: Build GDB
        run: |
          cd build-gdb
          make -j (sys cpu | length)
          make install

      - name: Package
        run: |
          tar -C $env.PREFIX -cJf $"gdb-($env.GDB_VERSION)-windows-x64-llvm-mingw.tar.xz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw
          path: gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw.tar.xz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GDB ${{ env.GDB_VERSION }} for Windows x64 llvm-mingw
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw.tar.xz
