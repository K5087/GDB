name: Build GDB

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gdb:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: nu {0}

    env:
      GDB_VERSION: "17.2"
      GMP_VERSION: "6.3.0"
      MPFR_VERSION: "4.2.1"
      ZLIB_VERSION: "1.3.2"
      XZ_VERSION: "5.8.1"
      EXPAT_VERSION: "2.7.1"
      LLVM_MINGW_VERSION: "20260505"
      PREFIX: "${{ github.workspace }}/gdb-install"
      DEPS_PREFIX: "${{ github.workspace }}/deps-install"
      PYTHON_VERSION: "3.14.5"
      LIBFFI_VERSION: "3.4.6"
      LIBUNISTRING_VERSION: "1.2"
      BDWGC_VERSION: "8.2.8"
      LIBICONV_VERSION: "1.17"
      GETTEXT_VERSION: "0.22.5"
      GUILE_VERSION: "3.0.10"
      PYTHON_ABI_VERSION: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"

      - name: Cache llvm-mingw
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ runner.os }}-${{ env.LLVM_MINGW_VERSION }}

      - name: Cache source tarballs
        id: cache-sources
        uses: actions/cache@v4
        with:
          path: sources
          key: sources-${{ runner.os }}-${{ env.GDB_VERSION }}-${{ env.GMP_VERSION }}-${{ env.MPFR_VERSION }}-${{ env.ZLIB_VERSION }}-${{ env.XZ_VERSION }}-${{ env.EXPAT_VERSION }}-${{ env.LIBFFI_VERSION }}-${{ env.LIBUNISTRING_VERSION }}-${{ env.BDWGC_VERSION }}-${{ env.LIBICONV_VERSION }}-${{ env.GETTEXT_VERSION }}-${{ env.PYTHON_VERSION }}-${{ env.GUILE_VERSION }}

      - name: Cache deps-install
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: deps-install
          key: deps-${{ runner.os }}-llvm-${{ env.LLVM_MINGW_VERSION }}-gmp-${{ env.GMP_VERSION }}-mpfr-${{ env.MPFR_VERSION }}-zlib-${{ env.ZLIB_VERSION }}-xz-${{ env.XZ_VERSION }}-expat-${{ env.EXPAT_VERSION }}-python-${{ env.PYTHON_VERSION }}-guile-${{ env.GUILE_VERSION }}

      - name: Cache host Python
        id: cache-host-python
        uses: actions/cache@v4
        with:
          path: host-python
          key: host-python-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ...[
            build-essential
            texinfo
            bison
            flex
            gettext
            pkg-config
            guile-3.0-dev
          ]

      - name: Download llvm-mingw
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          let url = $"https://github.com/mstorsjo/llvm-mingw/releases/download/($env.LLVM_MINGW_VERSION)/llvm-mingw-($env.LLVM_MINGW_VERSION)-ucrt-ubuntu-22.04-x86_64.tar.xz"
          curl -L -o llvm-mingw.tar.xz $url
          tar -xf llvm-mingw.tar.xz
          mv $"llvm-mingw-($env.LLVM_MINGW_VERSION)-ucrt-ubuntu-22.04-x86_64" llvm-mingw

      - name: Add llvm-mingw to PATH
        run: |
          $"($env.GITHUB_WORKSPACE)/llvm-mingw/bin" | save --append $env.GITHUB_PATH

      - name: Download sources
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: |
          mkdir sources
          curl -L -o sources/zlib.tar.gz https://zlib.net/zlib-($env.ZLIB_VERSION).tar.gz
          curl -L -o sources/xz.tar.xz https://github.com/tukaani-project/xz/releases/download/v($env.XZ_VERSION)/xz-($env.XZ_VERSION).tar.xz
          let expat_tag = ($env.EXPAT_VERSION | str replace --all "." "_")
          curl -L -o sources/expat.tar.xz $"https://github.com/libexpat/libexpat/releases/download/R_($expat_tag)/expat-($env.EXPAT_VERSION).tar.xz"
          curl -L -o sources/gdb.tar.xz $"https://ftp.gnu.org/gnu/gdb/gdb-($env.GDB_VERSION).tar.xz"
          curl -L -o sources/gmp.tar.xz $"https://ftp.gnu.org/gnu/gmp/gmp-($env.GMP_VERSION).tar.xz"
          curl -L -o sources/mpfr.tar.xz $"https://ftp.gnu.org/gnu/mpfr/mpfr-($env.MPFR_VERSION).tar.xz"
          curl -L -o sources/libffi.tar.gz $"https://github.com/libffi/libffi/releases/download/v($env.LIBFFI_VERSION)/libffi-($env.LIBFFI_VERSION).tar.gz"
          curl -L -o sources/libunistring.tar.xz $"https://ftp.gnu.org/gnu/libunistring/libunistring-($env.LIBUNISTRING_VERSION).tar.xz"
          curl -L -o sources/bdwgc.tar.gz $"https://github.com/ivmai/bdwgc/releases/download/v($env.BDWGC_VERSION)/gc-($env.BDWGC_VERSION).tar.gz"
          curl -L -o sources/libiconv.tar.gz $"https://ftp.gnu.org/pub/gnu/libiconv/libiconv-($env.LIBICONV_VERSION).tar.gz"
          curl -L -o sources/gettext.tar.xz $"https://ftp.gnu.org/pub/gnu/gettext/gettext-($env.GETTEXT_VERSION).tar.xz"
          curl -L -o sources/guile.tar.xz $"https://ftp.gnu.org/gnu/guile/guile-($env.GUILE_VERSION).tar.xz"
          curl -L -o sources/python.tar.xz $"https://www.python.org/ftp/python/($env.PYTHON_VERSION)/Python-($env.PYTHON_VERSION).tar.xz"

      - name: Extract sources
        run: |
          tar -xf sources/gmp.tar.xz
          tar -xf sources/mpfr.tar.xz
          tar -xf sources/zlib.tar.gz
          tar -xf sources/xz.tar.xz
          tar -xf sources/expat.tar.xz
          tar -xf sources/gdb.tar.xz

          tar -xf sources/libffi.tar.gz
          tar -xf sources/libunistring.tar.xz
          tar -xf sources/bdwgc.tar.gz
          tar -xf sources/libiconv.tar.gz
          tar -xf sources/gettext.tar.xz
          tar -xf sources/guile.tar.xz
          tar -xf sources/python.tar.xz

      - name: Build zlib
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd zlib-($env.ZLIB_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
          } {
            ^./configure --static $"--prefix=($env.DEPS_PREFIX)"
            make -j (sys cpu | length)
            make install
          }

      - name: Build xz liblzma
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd xz-($env.XZ_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ^./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
              --disable-xz
              --disable-xzdec
              --disable-lzmadec
              --disable-lzmainfo
              --disable-scripts
              --disable-doc
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build expat
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd expat-($env.EXPAT_VERSION)

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ^./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build GMP
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"gmp-($env.GMP_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build MPFR
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"mpfr-($env.MPFR_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              $"--with-gmp=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build libffi
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"libffi-($env.LIBFFI_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build libunistring
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"libunistring-($env.LIBUNISTRING_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -C lib -j (sys cpu | length)
            make -C lib install
          }

      - name: Build bdwgc
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"gc-($env.BDWGC_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build libiconv
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"libiconv-($env.LIBICONV_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build gettext libintl
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"gettext-($env.GETTEXT_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
              --disable-java
              --disable-native-java
              --disable-csharp
              --without-emacs
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build Guile
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"guile-($env.GUILE_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              $"--prefix=($env.DEPS_PREFIX)"
              --disable-shared
              --enable-static
              --without-threads
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Build host Python
        if: steps.cache-host-python.outputs.cache-hit != 'true'
        run: |
          cp -r $"Python-($env.PYTHON_VERSION)" $"Python-($env.PYTHON_VERSION)-host"
          cd $"Python-($env.PYTHON_VERSION)-host"

          ./configure $"--prefix=($env.GITHUB_WORKSPACE)/host-python"
          make -j (sys cpu | length)
          make install

      - name: Build target Python
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cd $"Python-($env.PYTHON_VERSION)"

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
            ac_cv_file__dev_ptmx: "no"
            ac_cv_file__dev_ptc: "no"
          } {
            ./configure ...[
              --host=x86_64-w64-mingw32
              --build=x86_64-pc-linux-gnu
              $"--prefix=($env.DEPS_PREFIX)"
              $"--with-build-python=($env.GITHUB_WORKSPACE)/host-python/bin/python3"
              --without-ensurepip
              --disable-test-modules
            ]

            make -j (sys cpu | length)
            make install
          }

      - name: Configure GDB
        run: |
          mkdir build-gdb
          cd build-gdb

          with-env {
            CC: "x86_64-w64-mingw32-clang"
            CXX: "x86_64-w64-mingw32-clang++"
            AR: "x86_64-w64-mingw32-ar"
            RANLIB: "x86_64-w64-mingw32-ranlib"
            STRIP: "x86_64-w64-mingw32-strip"
            PKG_CONFIG_LIBDIR: $"($env.DEPS_PREFIX)/lib/pkgconfig"
            CPPFLAGS: $"-I($env.DEPS_PREFIX)/include"
            LDFLAGS: $"-L($env.DEPS_PREFIX)/lib -static"
            LIBS: $"-lpython($env.PYTHON_ABI_VERSION) -lguile-3.0 -lgc -lffi -lunistring -lintl -liconv -lws2_32 -lshlwapi -lversion -lbcrypt"
          } {
            ../gdb-($env.GDB_VERSION)/configure ...[
              $"--prefix=($env.PREFIX)"
              --host=x86_64-w64-mingw32
              --target=x86_64-w64-mingw32
              $"--with-gmp=($env.DEPS_PREFIX)"
              $"--with-mpfr=($env.DEPS_PREFIX)"
              $"--with-python=($env.DEPS_PREFIX)/bin/python3.exe"
              $"--with-guile=($env.DEPS_PREFIX)/bin/guile.exe"
              --with-expat
              --with-lzma
              --with-zlib
              --disable-tui
              --enable-targets=all
              --enable-64-bit-bfd
              --enable-binary-file-formats=all
              --disable-binutils
              --disable-ld
              --disable-gold
              --disable-gas
              --disable-sim
              --disable-gprof
              --disable-gprofng
            ]
          }

      - name: Build GDB
        run: |
          cd build-gdb
          make -j (sys cpu | length)
          make install

      - name: Copy Python and Guile runtime
        run: |
          mkdir $"($env.PREFIX)/bin"
          mkdir $"($env.PREFIX)/lib"
          mkdir $"($env.PREFIX)/share"

          cp -r $"($env.DEPS_PREFIX)/lib/python($env.PYTHON_ABI_VERSION)" $"($env.PREFIX)/lib/" | ignore
          cp -r $"($env.DEPS_PREFIX)/lib/guile" $"($env.PREFIX)/lib/" | ignore
          cp -r $"($env.DEPS_PREFIX)/share/guile" $"($env.PREFIX)/share/" | ignore
          cp $"($env.DEPS_PREFIX)/bin/"*.dll $"($env.PREFIX)/bin/" | ignore

      - name: Package
        run: |
          tar -C $env.PREFIX -cJf $"gdb-($env.GDB_VERSION)-windows-x64-llvm-mingw.tar.xz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw
          path: gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw.tar.xz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GDB ${{ env.GDB_VERSION }} for Windows x64 llvm-mingw
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            gdb-${{ env.GDB_VERSION }}-windows-x64-llvm-mingw.tar.xz
